<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#c9a227" />
  <title>Login — Lord's Burger House</title>
  <link rel="icon" href="../../assets/images/logos/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#060401;--bg-card:#161208;
      --gold:#c9a227;--gold-light:#e6c84a;--gold-dim:#a8841e;
      --gold-glow:rgba(201,162,39,.1);--gold-border:rgba(201,162,39,.2);
      --cream:#f5e6c8;--cream-2:#e8d4a8;--cream-muted:#8c7a52;--cream-faint:#4a3e28;
      --red:#e74c3c;--green:#25d366;
      --font-display:'Cinzel',serif;--font-serif:'Playfair Display',Georgia,serif;--font-body:'Inter',system-ui,sans-serif;
      --r-md:12px;--r-lg:18px;--r-full:9999px;--t:.22s cubic-bezier(.4,0,.2,1);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{font-size:16px}
    body{
      background:var(--bg);color:var(--cream);
      font-family:var(--font-body);line-height:1.6;
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      -webkit-font-smoothing:antialiased;
      position:relative;overflow:hidden;
    }
    a{color:inherit;text-decoration:none}
    button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
    input{font:inherit;color:inherit}

    /* atmospheric bg */
    .bg-glow{
      position:fixed;inset:0;pointer-events:none;
      background:
        radial-gradient(ellipse 80% 60% at 50% 50%,rgba(201,162,39,.06) 0%,transparent 70%),
        radial-gradient(ellipse 40% 30% at 20% 80%,rgba(201,162,39,.04) 0%,transparent 60%);
    }
    .bg-lines{
      position:fixed;inset:0;pointer-events:none;opacity:.03;
      background-image:repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(201,162,39,1) 60px,rgba(201,162,39,1) 61px);
    }

    /* card */
    .auth-card{
      position:relative;z-index:1;
      width:100%;max-width:440px;
      background:var(--bg-card);
      border:1px solid var(--gold-border);
      border-radius:24px;
      padding:40px 36px;
      box-shadow:0 24px 80px rgba(0,0,0,.6);
      animation:fadeUp .5s ease both;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

    .auth-logo{
      display:flex;flex-direction:column;align-items:center;gap:10px;
      margin-bottom:28px;
    }
    .auth-logo img{width:72px;height:72px;object-fit:contain}
    .auth-logo__name{
      font-family:var(--font-display);
      font-size:.75rem;font-weight:700;
      letter-spacing:.22em;text-transform:uppercase;
      color:var(--gold);
    }
    h1{
      font-family:var(--font-serif);
      font-size:1.7rem;font-weight:700;
      letter-spacing:-.01em;
      color:var(--cream);
      text-align:center;margin-bottom:6px;
    }
    .auth-sub{
      text-align:center;font-size:.88rem;
      color:var(--cream-muted);margin-bottom:28px;
    }

    /* form */
    .form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
    .form-group label{
      font-family:var(--font-display);
      font-size:.6rem;font-weight:700;
      letter-spacing:.16em;text-transform:uppercase;
      color:var(--cream-muted);
    }
    .form-control{
      padding:12px 14px;
      background:rgba(255,255,255,.03);
      border:1.5px solid var(--gold-border);
      border-radius:var(--r-md);
      font-size:.9rem;color:var(--cream);
      transition:border-color var(--t),box-shadow var(--t);
      outline:none;width:100%;
    }
    .form-control:focus{
      border-color:var(--gold);
      box-shadow:0 0 0 3px rgba(201,162,39,.12);
    }
    .form-control::placeholder{color:var(--cream-faint)}

    .form-options{
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:24px;font-size:.82rem;
    }
    .check-label{
      display:flex;align-items:center;gap:8px;
      cursor:pointer;color:var(--cream-muted);
    }
    .check-label input[type=checkbox]{
      width:16px;height:16px;accent-color:var(--gold);cursor:pointer;
    }
    .link-gold{color:var(--gold);transition:color var(--t)}
    .link-gold:hover{color:var(--gold-light)}

    .btn-submit{
      display:flex;align-items:center;justify-content:center;gap:8px;
      width:100%;padding:14px;border-radius:var(--r-full);
      background:linear-gradient(135deg,var(--gold-light),var(--gold));
      color:#0d0a00;
      font-family:var(--font-display);font-size:.78rem;font-weight:700;
      letter-spacing:.12em;text-transform:uppercase;
      box-shadow:0 4px 20px rgba(201,162,39,.3);
      transition:all var(--t);cursor:pointer;border:none;
    }
    .btn-submit:hover{box-shadow:0 6px 28px rgba(201,162,39,.45);transform:translateY(-1px)}
    .btn-submit:disabled{opacity:.55;pointer-events:none}

    .auth-divider{
      display:flex;align-items:center;gap:12px;
      margin:22px 0;
    }
    .auth-divider span{flex:1;height:1px;background:var(--gold-border)}
    .auth-divider p{font-size:.78rem;color:var(--cream-faint);white-space:nowrap}

    .auth-footer{
      text-align:center;font-size:.85rem;
      color:var(--cream-muted);margin-top:24px;
    }

    .error-msg{
      display:none;
      background:rgba(192,57,43,.12);
      border:1px solid rgba(192,57,43,.3);
      border-radius:var(--r-md);
      padding:10px 14px;
      font-size:.82rem;color:var(--red);
      margin-bottom:16px;
      align-items:center;gap:8px;
    }
    .error-msg.show{display:flex}

    .loading-overlay{
      display:none;position:fixed;inset:0;
      background:rgba(6,4,1,.8);backdrop-filter:blur(4px);
      z-index:500;align-items:center;justify-content:center;
    }
    .loading-overlay.show{display:flex}
    .spinner{
      width:36px;height:36px;border-radius:50%;
      border:2.5px solid rgba(201,162,39,.25);
      border-top-color:var(--gold);
      animation:spin .7s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* back to store link */
    .back-link{
      position:fixed;top:20px;left:20px;z-index:10;
      display:flex;align-items:center;gap:8px;
      font-size:.78rem;color:var(--cream-muted);
      transition:color var(--t);
    }
    .back-link:hover{color:var(--gold)}
  </style>
</head>
<body>

  <div class="bg-glow"></div>
  <div class="bg-lines"></div>

  <a href="../../index.html" class="back-link">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Voltar ao cardápio
  </a>

  <div class="auth-card">
    <div class="auth-logo">
      <img src="../../assets/images/logos/logo.png" alt="Lord's Burger House" />
      <span class="auth-logo__name">Lord's Burger House</span>
    </div>

    <h1>Bem-vindo de volta</h1>
    <p class="auth-sub">Entre para acompanhar seus pedidos</p>

    <div class="error-msg" id="errorMsg">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="errorText">E-mail ou senha incorretos.</span>
    </div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">E-mail</label>
        <input class="form-control" type="email" id="email" placeholder="seu@email.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input class="form-control" type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>

      <div class="form-options">
        <label class="check-label">
          <input type="checkbox" id="rememberMe" />
          Lembrar de mim
        </label>
        <a href="#" class="link-gold" id="forgotPassLink">Esqueci a senha</a>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Entrar
      </button>
    </form>

    <div class="auth-divider">
      <span></span>
      <p>Não tem conta?</p>
      <span></span>
    </div>

    <div class="auth-footer">
      <a href="register.html" class="link-gold" style="font-weight:600">Criar conta gratuita</a>
    </div>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <!-- PASSWORD RESET OVERLAY -->
  <div id="resetOverlay" style="display:none;position:fixed;inset:0;z-index:200;
       background:rgba(6,4,1,.85);backdrop-filter:blur(4px);
       align-items:center;justify-content:center">
    <div style="background:var(--bg-card);border:1px solid var(--gold-border);border-radius:24px;
                padding:36px;max-width:400px;width:90%;box-shadow:0 24px 80px rgba(0,0,0,.6);
                animation:fadeUp .35s ease both">
      <h2 style="font-family:var(--font-serif);font-size:1.4rem;font-weight:700;
                 color:var(--cream);margin-bottom:8px">Redefinir senha</h2>
      <p style="font-size:.86rem;color:var(--cream-muted);margin-bottom:20px;line-height:1.6">
        Informe seu e-mail e enviaremos um link para criar uma nova senha.
      </p>
      <div id="resetMsg" style="display:none;padding:10px 14px;border-radius:var(--r-md);
           font-size:.82rem;margin-bottom:14px;line-height:1.5"></div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <input id="resetEmail" type="email" class="form-control"
               placeholder="seu@email.com" autocomplete="email"/>
        <button id="resetSendBtn" class="btn-submit">Enviar link de redefinição</button>
        <button id="resetCancelBtn"
                style="background:none;border:none;color:var(--cream-muted);
                       font-size:.85rem;cursor:pointer;padding:8px">
          Cancelar
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db, ROLE_HOME } from '../../assets/js/firebase-config.js';
    import {
      signInWithEmailAndPassword,
      setPersistence,
      browserLocalPersistence,
      browserSessionPersistence,
      onAuthStateChanged,
      sendPasswordResetEmail
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const form    = document.getElementById('loginForm');
    const errorEl = document.getElementById('errorMsg');
    const errorTx = document.getElementById('errorText');
    const loading = document.getElementById('loadingOverlay');
    const submit  = document.getElementById('submitBtn');

    /* ── redirect if already logged in ── */
    onAuthStateChanged(auth, async user => {
      if (!user) return;
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (!snap.exists()) return;
      const role = snap.data().role || 'customer';
      window.location.href = getHome(role);
    });

    function getHome(role) {
      /* relative path from pages/auth/ */
      return {
        admin:     '../admin/dashboard.html',
        attendant: '../attendant/dashboard.html',
        customer:  '../customer/orders.html'
      }[role] || '../customer/orders.html';
    }

    /* ── password reset ── */
    const resetOverlay = document.getElementById('resetOverlay');
    const resetMsg     = document.getElementById('resetMsg');
    const resetEmailEl = document.getElementById('resetEmail');

    function openReset() {
      resetMsg.style.display = 'none';
      resetEmailEl.value = document.getElementById('email').value.trim();
      resetOverlay.style.display = 'flex';
      setTimeout(() => resetEmailEl.focus(), 50);
    }
    function closeReset() {
      resetOverlay.style.display = 'none';
    }

    document.getElementById('forgotPassLink').addEventListener('click', e => {
      e.preventDefault();
      openReset();
    });
    document.getElementById('resetCancelBtn').addEventListener('click', closeReset);
    resetOverlay.addEventListener('click', e => { if (e.target === resetOverlay) closeReset(); });

    document.getElementById('resetSendBtn').addEventListener('click', async () => {
      const email = resetEmailEl.value.trim();
      resetMsg.style.display = 'none';

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        resetMsg.style.cssText += ';display:block;background:rgba(192,57,43,.12);border:1px solid rgba(192,57,43,.3);color:var(--red)';
        resetMsg.textContent = 'Informe um e-mail válido.';
        return;
      }

      const btn = document.getElementById('resetSendBtn');
      btn.disabled = true;
      btn.textContent = 'Enviando…';

      try {
        await sendPasswordResetEmail(auth, email);
        resetMsg.style.cssText = 'display:block;background:rgba(37,211,102,.08);border:1px solid rgba(37,211,102,.3);color:#25d366;padding:10px 14px;border-radius:var(--r-md);font-size:.82px;margin-bottom:14px;line-height:1.5';
        resetMsg.textContent = `Link enviado para ${email}. Verifique sua caixa de entrada (e o spam).`;
        btn.textContent = 'Enviado!';
        setTimeout(closeReset, 3500);
      } catch (err) {
        const msgs = {
          'auth/user-not-found':  'Nenhuma conta com este e-mail.',
          'auth/invalid-email':   'E-mail inválido.',
          'auth/too-many-requests': 'Muitas tentativas. Aguarde alguns minutos.'
        };
        resetMsg.style.cssText = 'display:block;background:rgba(192,57,43,.12);border:1px solid rgba(192,57,43,.3);color:var(--red);padding:10px 14px;border-radius:var(--r-md);font-size:.82px;margin-bottom:14px;line-height:1.5';
        resetMsg.textContent = msgs[err.code] || 'Erro ao enviar. Tente novamente.';
        btn.disabled = false;
        btn.textContent = 'Enviar link de redefinição';
      }
    });

    form.addEventListener('submit', async e => {
      e.preventDefault();
      errorEl.classList.remove('show');

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('rememberMe').checked;

      if (!email || !password) {
        errorTx.textContent = 'Preencha e-mail e senha.';
        errorEl.classList.add('show');
        return;
      }

      submit.disabled = true;
      loading.classList.add('show');

      try {
        await setPersistence(auth, remember ? browserLocalPersistence : browserSessionPersistence);
        const cred = await signInWithEmailAndPassword(auth, email, password);
        const snap = await getDoc(doc(db, 'users', cred.user.uid));
        const role = snap.exists() ? snap.data().role : 'customer';
        window.location.href = getHome(role);
      } catch (err) {
        loading.classList.remove('show');
        submit.disabled = false;
        const msgs = {
          'auth/user-not-found':    'Nenhuma conta com este e-mail.',
          'auth/wrong-password':    'Senha incorreta.',
          'auth/invalid-email':     'E-mail inválido.',
          'auth/too-many-requests': 'Muitas tentativas. Aguarde alguns minutos.',
          'auth/invalid-credential':'E-mail ou senha incorretos.'
        };
        errorTx.textContent = msgs[err.code] || 'Erro ao entrar. Tente novamente.';
        errorEl.classList.add('show');
      }
    });
  </script>
</body>
</html>
