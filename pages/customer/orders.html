<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Meus Pedidos — Lord's Burger House</title>
  <link rel="icon" href="../../assets/images/logos/icon-192.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../../assets/css/panel.css"/>
  <style>
    body{display:block}
    .panel-layout{display:flex;flex-direction:column;min-height:100vh}

    /* top nav */
    .top-nav{
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 24px;
      background:rgba(13,10,3,.97);
      border-bottom:1px solid var(--gold-border);
      position:sticky;top:0;z-index:100;
    }
    .top-nav__logo{display:flex;align-items:center;gap:10px}
    .top-nav__logo img{width:38px;height:38px;object-fit:contain}
    .top-nav__name{
      font-family:var(--font-display);font-size:.7rem;font-weight:700;
      letter-spacing:.18em;text-transform:uppercase;color:var(--gold);
    }
    .top-nav__actions{display:flex;align-items:center;gap:12px}

    .content{max-width:820px;margin:0 auto;padding:32px 20px}

    /* hero */
    .orders-hero{text-align:center;padding:32px 0 24px}
    .orders-hero h1{font-family:var(--font-serif);font-size:2rem;font-weight:700;color:var(--cream)}
    .orders-hero p{font-size:.9rem;color:var(--cream-muted);margin-top:6px}

    /* ── LOYALTY CARD ── */
    .loyalty-card {
      background: linear-gradient(135deg, #1a1408 0%, #0d0a03 100%);
      border: 1px solid rgba(201,162,39,.35);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
    }
    .loyalty-card::before {
      content: '👑';
      position: absolute; right: 24px; top: 20px;
      font-size: 3rem; opacity: .12;
    }
    .loyalty-card__title {
      font-family: var(--font-display); font-size: .68rem;
      font-weight: 700; letter-spacing: .2em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 16px;
    }
    .loyalty-balance {
      font-family: var(--font-serif); font-size: 2.8rem;
      font-weight: 700; color: var(--gold-light); line-height: 1;
      margin-bottom: 4px;
    }
    .loyalty-balance span { font-size: 1rem; color: var(--gold); font-family: var(--font-display); letter-spacing: .08em; }
    .loyalty-stats {
      display: flex; gap: 20px; margin-top: 16px; flex-wrap: wrap;
    }
    .loyalty-stat { display: flex; flex-direction: column; gap: 2px; }
    .loyalty-stat__val { font-size: 1.05rem; font-weight: 700; color: var(--cream); }
    .loyalty-stat__label { font-size: .7rem; color: var(--cream-muted); letter-spacing: .04em; }
    .loyalty-card__tabs {
      display: flex; gap: 8px; margin-top: 20px; border-top: 1px solid rgba(201,162,39,.15); padding-top: 16px;
    }
    .lc-tab {
      padding: 7px 16px; border-radius: 9999px; border: 1px solid var(--gold-border);
      background: transparent; color: var(--cream-muted); font-size: .78rem; cursor: pointer;
      transition: all .2s;
    }
    .lc-tab.active { background: rgba(201,162,39,.15); color: var(--gold); border-color: var(--gold); }

    /* ── REWARDS CATALOG ── */
    .rewards-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px; margin-top: 16px;
    }
    .reward-card {
      background: var(--bg-card);
      border: 1px solid var(--gold-border);
      border-radius: 14px; padding: 16px; text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .reward-card__img {
      width: 64px; height: 64px; border-radius: 10px;
      object-fit: cover; background: var(--bg-700);
      border: 1px solid var(--gold-border);
    }
    .reward-card__img.placeholder {
      display: flex; align-items: center; justify-content: center; font-size: 2rem;
    }
    .reward-card__name { font-size: .88rem; font-weight: 700; color: var(--cream); }
    .reward-card__desc { font-size: .72rem; color: var(--cream-muted); line-height: 1.4; }
    .reward-card__cost {
      font-family: var(--font-display); font-size: .72rem; font-weight: 700;
      color: var(--gold); letter-spacing: .06em;
    }
    .btn-redeem {
      width: 100%; padding: 9px; border-radius: 9999px;
      background: linear-gradient(135deg,#e6c84a,#c9a227);
      color: #0d0a00; border: none; font-size: .78rem; font-weight: 700;
      cursor: pointer; transition: transform .15s, box-shadow .15s;
    }
    .btn-redeem:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(201,162,39,.3); }
    .btn-redeem:disabled { opacity: .4; pointer-events: none; }

    /* ── TRANSACTION HISTORY ── */
    .tx-list { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
    .tx-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-radius: 10px;
      background: var(--bg-card-alt); border: 1px solid rgba(201,162,39,.1);
    }
    .tx-item__icon { font-size: 1.2rem; flex-shrink: 0; }
    .tx-item__info { flex: 1; min-width: 0; }
    .tx-item__desc { font-size: .84rem; color: var(--cream); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tx-item__date { font-size: .72rem; color: var(--cream-muted); }
    .tx-item__amount { font-family: var(--font-serif); font-size: .95rem; font-weight: 700; white-space: nowrap; }
    .tx-item__amount.earn   { color: #2ecc71; }
    .tx-item__amount.redeem { color: #e74c3c; }

    /* order cards */
    .order-wrap{display:flex;flex-direction:column;gap:16px}
    .order-item{background:var(--bg-card);border:1px solid var(--gold-border);border-radius:var(--r-lg);overflow:hidden;transition:border-color var(--t)}
    .order-item.active{border-color:rgba(201,162,39,.4)}
    .order-item__head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--gold-border);background:rgba(201,162,39,.04);cursor:pointer}
    .order-item__num{font-family:var(--font-display);font-size:.78rem;font-weight:700;letter-spacing:.1em;color:var(--gold-light)}
    .order-item__date{font-size:.75rem;color:var(--cream-muted)}
    .order-item__body{padding:18px 20px}
    .order-item__products{font-size:.85rem;color:var(--cream-2);line-height:1.8;margin-bottom:14px}
    .order-item__products strong{color:var(--cream);font-weight:600}
    .order-item__meta{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;padding-top:14px;border-top:1px solid var(--gold-border)}
    .order-item__total{font-family:var(--font-serif);font-size:1.1rem;font-weight:700;color:var(--gold-light)}
    .order-item__mode{font-size:.8rem;color:var(--cream-muted)}

    /* timeline */
    .status-timeline{display:flex;align-items:flex-start;gap:0;margin:18px 0 6px;position:relative}
    .timeline-step{display:flex;flex-direction:column;align-items:center;flex:1;position:relative}
    .timeline-step::before{content:'';position:absolute;top:14px;left:50%;width:100%;height:2px;background:var(--cream-faint);z-index:0}
    .timeline-step:last-child::before{display:none}
    .timeline-step.done::before{background:var(--gold)}
    .timeline-step__dot{width:28px;height:28px;border-radius:50%;background:var(--bg-700);border:2px solid var(--cream-faint);display:flex;align-items:center;justify-content:center;font-size:.85rem;z-index:1;position:relative;transition:all .3s}
    .timeline-step.done .timeline-step__dot{background:var(--gold);border-color:var(--gold);box-shadow:0 0 12px rgba(201,162,39,.4)}
    .timeline-step.active .timeline-step__dot{background:rgba(201,162,39,.15);border-color:var(--gold);animation:pulse-ring 1.5s ease-in-out infinite}
    @keyframes pulse-ring{0%,100%{box-shadow:0 0 0 0 rgba(201,162,39,.4)}50%{box-shadow:0 0 0 8px rgba(201,162,39,0)}}
    .timeline-step__label{font-size:.62rem;font-family:var(--font-display);letter-spacing:.04em;text-transform:uppercase;color:var(--cream-faint);margin-top:6px;text-align:center;line-height:1.3}
    .timeline-step.done .timeline-step__label,.timeline-step.active .timeline-step__label{color:var(--cream-muted)}

    .state-center{text-align:center;padding:80px 24px;display:flex;flex-direction:column;align-items:center;gap:16px}
    .state-center__icon{font-size:3.5rem;opacity:.3}
    .state-center h3{font-family:var(--font-serif);font-size:1.3rem;color:var(--cream-2)}
    .state-center p{font-size:.88rem;color:var(--cream-muted)}
  </style>
</head>
<body>

<div class="panel-layout">
  <nav class="top-nav">
    <a href="../../index.html" class="top-nav__logo">
      <img src="../../assets/images/logos/logo.png" alt="Lord's Burger House"/>
      <span class="top-nav__name">Lord's Burger House</span>
    </a>
    <div class="top-nav__actions">
      <a href="../../index.html" class="btn btn--outline btn--sm">Fazer pedido</a>
      <button class="btn btn--ghost btn--sm" id="logoutBtn">Sair</button>
    </div>
  </nav>

  <div class="content">
    <div class="orders-hero">
      <h1>Meus Pedidos</h1>
      <p id="heroSub">Acompanhe seus pedidos em tempo real</p>
    </div>

    <!-- ══ LOYALTY CARD ══ -->
    <div class="loyalty-card" id="loyaltyCard" style="display:none">
      <div class="loyalty-card__title">👑 Coroas Lord's — Programa de Fidelidade</div>
      <div class="loyalty-balance" id="loyBalance">0 <span>Coroas</span></div>
      <div class="loyalty-stats">
        <div class="loyalty-stat">
          <span class="loyalty-stat__val" id="loyEarned">0</span>
          <span class="loyalty-stat__label">Total acumulado</span>
        </div>
        <div class="loyalty-stat">
          <span class="loyalty-stat__val" id="loyRedeemed">0</span>
          <span class="loyalty-stat__label">Total resgatado</span>
        </div>
      </div>
      <div class="loyalty-card__tabs">
        <button class="lc-tab active" data-ltab="rewards">Recompensas</button>
        <button class="lc-tab" data-ltab="history">Histórico</button>
      </div>

      <!-- Rewards tab -->
      <div id="ltab-rewards">
        <div class="rewards-grid" id="rewardsGrid">
          <p style="color:var(--cream-muted);font-size:.85rem;grid-column:1/-1">Carregando recompensas...</p>
        </div>
      </div>

      <!-- History tab -->
      <div id="ltab-history" style="display:none">
        <div class="tx-list" id="txList">
          <p style="color:var(--cream-muted);font-size:.85rem">Carregando histórico...</p>
        </div>
      </div>
    </div>

    <!-- Orders -->
    <div id="ordersWrap" class="order-wrap">
      <div class="state-center">
        <div class="spinner" style="width:32px;height:32px"></div>
        <p style="color:var(--cream-muted)">Carregando pedidos...</p>
      </div>
    </div>
    <div id="loadMoreWrap" style="display:none;text-align:center;padding:20px 0">
      <button id="loadMoreBtn" class="btn btn--outline"
              style="border-color:rgba(201,162,39,.4);color:var(--gold);padding:10px 28px;border-radius:9999px">
        Carregar mais pedidos
      </button>
    </div>
  </div>
</div>

<script type="module">
  import { auth, db, ORDER_STATUS } from '../../assets/js/firebase-config.js';
  import { onAuthStateChanged, signOut }
    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
  import {
    collection, query, where, onSnapshot, doc, getDoc, getDocs, orderBy, limit
  } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
  import { escapeHtml } from '../../assets/js/shared/sanitizer.js';
  import { fmt, fmtDatetime } from '../../assets/js/shared/formatters.js';
  import { getBalance, getTransactions, redeemReward } from '../../assets/js/shared/loyalty.js';

  /* ── helpers ── */
  function fmtTs(ts) {
    if (!ts) return '—';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  /* ── pagination ── */
  const PAGE_SIZE = 10;
  let visibleLimit = PAGE_SIZE;
  function loadMoreOrders() { visibleLimit += PAGE_SIZE; mergeAndRender(); }
  document.getElementById('loadMoreBtn').addEventListener('click', loadMoreOrders);

  const wrap = document.getElementById('ordersWrap');

  /* ── loyalty tabs ── */
  document.querySelectorAll('.lc-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.lc-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.ltab;
      document.getElementById('ltab-rewards').style.display = tab === 'rewards' ? '' : 'none';
      document.getElementById('ltab-history').style.display = tab === 'history'  ? '' : 'none';
    });
  });

  /* ── load loyalty data ── */
  let currentUser = null;
  let currentBalance = 0;

  async function loadLoyalty(uid) {
    const card = document.getElementById('loyaltyCard');
    card.style.display = '';

    // Balance
    const data = await getBalance(uid, db);
    currentBalance = data.balance || 0;
    document.getElementById('loyBalance').innerHTML = `${currentBalance} <span>Coroas</span>`;
    document.getElementById('loyEarned').textContent   = data.totalEarned   || 0;
    document.getElementById('loyRedeemed').textContent = data.totalRedeemed || 0;

    // Rewards catalog
    loadRewards(uid);

    // History (loaded on demand)
    loadHistory(uid);
  }

  async function loadRewards(uid) {
    const grid = document.getElementById('rewardsGrid');
    try {
      const snap = await getDocs(query(
        collection(db, 'rewards'),
        where('ativo', '==', true),
        orderBy('custo')
      ));
      const rewards = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (!rewards.length) {
        grid.innerHTML = '<p style="color:var(--cream-muted);font-size:.85rem;grid-column:1/-1">Nenhuma recompensa disponível no momento.</p>';
        return;
      }
      grid.innerHTML = '';
      rewards.forEach(r => {
        const canRedeem = currentBalance >= r.custo;
        const card = document.createElement('div');
        card.className = 'reward-card';
        card.innerHTML = `
          ${r.imagem
            ? `<img class="reward-card__img" src="${escapeHtml(r.imagem)}" alt="${escapeHtml(r.nome)}" />`
            : `<div class="reward-card__img placeholder">🍔</div>`}
          <div class="reward-card__name">${escapeHtml(r.nome)}</div>
          ${r.descricao ? `<div class="reward-card__desc">${escapeHtml(r.descricao)}</div>` : ''}
          <div class="reward-card__cost">👑 ${r.custo} Coroas</div>
          <button class="btn-redeem" ${canRedeem ? '' : 'disabled'} data-rid="${r.id}">
            ${canRedeem ? 'Resgatar' : `Faltam ${r.custo - currentBalance} Coroas`}
          </button>`;
        card.querySelector('.btn-redeem:not([disabled])')?.addEventListener('click', () => doRedeem(r, uid));
        grid.appendChild(card);
      });
    } catch(e) {
      grid.innerHTML = '<p style="color:var(--cream-muted);font-size:.85rem;grid-column:1/-1">Erro ao carregar recompensas.</p>';
    }
  }

  async function loadHistory(uid) {
    const list = document.getElementById('txList');
    const txs  = await getTransactions(uid, db, 30);
    if (!txs.length) {
      list.innerHTML = '<p style="color:var(--cream-muted);font-size:.85rem">Nenhuma transação ainda.</p>';
      return;
    }
    list.innerHTML = '';
    txs.forEach(tx => {
      const isEarn = tx.type === 'earn' || tx.amount > 0;
      const el = document.createElement('div');
      el.className = 'tx-item';
      el.innerHTML = `
        <div class="tx-item__icon">${isEarn ? '👑' : '🎁'}</div>
        <div class="tx-item__info">
          <div class="tx-item__desc">${escapeHtml(tx.description || '—')}</div>
          <div class="tx-item__date">${fmtTs(tx.createdAt)}</div>
        </div>
        <div class="tx-item__amount ${isEarn ? 'earn' : 'redeem'}">
          ${isEarn ? '+' : ''}${tx.amount} Coroas
        </div>`;
      list.appendChild(el);
    });
  }

  /* ── redeem reward ── */
  async function doRedeem(reward, uid) {
    if (!confirm(`Resgatar "${reward.nome}" por ${reward.custo} Coroas?`)) return;

    const btn = document.querySelector(`[data-rid="${reward.id}"]`);
    if (btn) { btn.disabled = true; btn.textContent = 'Processando...'; }

    const result = await redeemReward(uid, reward, db);

    if (result.success) {
      showMsg(result.message, true);
      await loadLoyalty(uid); // refresh balance + catalog
    } else {
      showMsg(result.message, false);
      if (btn) { btn.disabled = false; btn.textContent = 'Resgatar'; }
    }
  }

  /* ── inline toast ── */
  function showMsg(msg, ok) {
    const el = document.createElement('div');
    el.style.cssText = `position:fixed;bottom:24px;right:24px;z-index:300;
      background:${ok ? 'rgba(46,204,113,.15)' : 'rgba(192,57,43,.15)'};
      border:1px solid ${ok ? 'rgba(46,204,113,.5)' : 'rgba(192,57,43,.5)'};
      color:${ok ? '#2ecc71' : '#e74c3c'};
      padding:12px 20px;border-radius:10px;font-size:.85rem;
      animation:fadeIn .3s ease`;
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }

  /* ── orders render ── */
  const STEPS = [
    { key: 'pending',    emoji: '⏳', label: 'Recebido' },
    { key: 'confirmed',  emoji: '✅', label: 'Confirmado' },
    { key: 'preparing',  emoji: '👨‍🍳', label: 'Em preparo' },
    { key: 'delivering', emoji: '🛵', label: 'Saiu p/ entrega' },
    { key: 'delivered',  emoji: '🏁', label: 'Entregue' }
  ];
  const STEPS_PICKUP = [
    { key: 'pending',   emoji: '⏳', label: 'Recebido' },
    { key: 'confirmed', emoji: '✅', label: 'Confirmado' },
    { key: 'preparing', emoji: '👨‍🍳', label: 'Em preparo' },
    { key: 'ready',     emoji: '🟢', label: 'Pronto' },
    { key: 'delivered', emoji: '🏁', label: 'Retirado' }
  ];

  function statusIndex(order){
    const steps = order.deliveryMode === 'pickup' ? STEPS_PICKUP : STEPS;
    const i = steps.findIndex(s => s.key === order.status);
    return { steps, idx: i >= 0 ? i : 0 };
  }

  function renderTimeline(order){
    const { steps, idx } = statusIndex(order);
    if (order.status === 'cancelled') return `<p style="color:#e74c3c;font-size:.85rem">⛔ Pedido cancelado</p>`;
    return `<div class="status-timeline">
      ${steps.map((s, i) => `
        <div class="timeline-step ${i < idx ? 'done' : i === idx ? 'active' : ''}">
          <div class="timeline-step__dot">${i <= idx ? s.emoji : ''}</div>
          <span class="timeline-step__label">${s.label}</span>
        </div>`).join('')}
    </div>`;
  }

  function renderOrders(orders) {
    if (!orders.length) {
      wrap.innerHTML = `<div class="state-center">
        <div class="state-center__icon">🍔</div>
        <h3>Nenhum pedido ainda</h3>
        <p>Faça seu primeiro pedido e acompanhe aqui em tempo real!</p>
        <a href="../../index.html" class="btn btn--primary" style="margin-top:8px">Ver cardápio</a>
      </div>`;
      return;
    }
    wrap.innerHTML = orders.map(o => `
      <div class="order-item ${['pending','confirmed','preparing','delivering','ready'].includes(o.status) ? 'active' : ''}">
        <div class="order-item__head">
          <span class="order-item__num">#${o.orderNumber || o.id.slice(0,8).toUpperCase()}</span>
          <div style="display:flex;align-items:center;gap:12px">
            <span class="status-badge status-badge--${o.status}">${ORDER_STATUS[o.status]?.icon || ''} ${ORDER_STATUS[o.status]?.label || o.status}</span>
            <span class="order-item__date">${fmtDatetime(o.createdAt)}</span>
          </div>
        </div>
        <div class="order-item__body">
          ${renderTimeline(o)}
          <div class="order-item__products">
            ${o.items?.map(i => `<span><strong>${i.qty}x</strong> ${escapeHtml(i.name)}</span>`).join(' &nbsp;·&nbsp; ') || ''}
          </div>
          <div class="order-item__meta">
            <span class="order-item__mode">${o.deliveryMode === 'delivery' ? '🛵 Delivery' : '🏠 Retirada'} · ${escapeHtml(o.payment || '')}</span>
            <span class="order-item__total">R$ ${fmt(o.total || 0)}</span>
          </div>
          ${o.pointsAwarded ? `<p style="font-size:.75rem;color:var(--gold);margin-top:8px">👑 +${o.pointsAmount||Math.floor(o.total||0)} Coroas creditadas</p>` : ''}
          ${o.obs ? `<p style="font-size:.8rem;color:var(--cream-muted);margin-top:6px">📝 ${escapeHtml(o.obs)}</p>` : ''}
        </div>
      </div>`).join('');
  }

  let byUid = [], byPhone = [];
  function mergeAndRender() {
    const map = new Map();
    [...byUid, ...byPhone].forEach(o => map.set(o.id, o));
    const all = [...map.values()].sort((a, b) => {
      const ta = a.createdAt?.seconds || a.createdAt?.toMillis?.() / 1000 || 0;
      const tb = b.createdAt?.seconds || b.createdAt?.toMillis?.() / 1000 || 0;
      return tb - ta;
    });
    renderOrders(all.slice(0, visibleLimit));
    const w = document.getElementById('loadMoreWrap');
    if (w) w.style.display = visibleLimit < all.length ? '' : 'none';
  }

  /* ── auth guard ── */
  onAuthStateChanged(auth, async user => {
    if (!user) { window.location.href = '../auth/login.html'; return; }
    currentUser = user;

    document.getElementById('heroSub').textContent =
      `Olá, ${user.displayName?.split(' ')[0] || 'cliente'}! Acompanhe seus pedidos abaixo.`;

    // Load loyalty panel
    loadLoyalty(user.uid);

    // Orders by UID
    const qUid = query(collection(db, 'orders'), where('customerId', '==', user.uid));
    onSnapshot(qUid, snap => {
      byUid = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      mergeAndRender();
    }, () => {});

    // Orders by phone
    try {
      const userSnap = await getDoc(doc(db, 'users', user.uid));
      const phone = userSnap.data()?.phone?.replace(/\D/g, '') || '';
      if (phone) {
        const qPhone = query(collection(db, 'orders'), where('customerPhone', '==', phone));
        onSnapshot(qPhone, snap => {
          byPhone = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          mergeAndRender();
        }, () => {});
      }
    } catch(e) {}
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await signOut(auth);
    window.location.href = '../auth/login.html';
  });

  const style = document.createElement('style');
  style.textContent = '@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}';
  document.head.appendChild(style);
</script>
</body>
</html>
