<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="theme-color" content="#c9a227"/>
  <title>Sem conexão — Lord's Burger House</title>
  <link rel="icon" type="image/png" sizes="192x192" href="assets/images/logos/icon-192.png"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --gold:#c9a227;
      --gold-light:#e0b84a;
      --cream:#e8d5a3;
      --cream-muted:rgba(232,213,163,.55);
      --bg:#0d0a03;
      --bg-card:rgba(255,255,255,.04);
      --border:rgba(201,162,39,.18);
      --font-display:'Cinzel',serif;
      --font-serif:'Playfair Display',Georgia,serif;
      --font-sans:'Inter',system-ui,sans-serif;
    }

    html,body{
      height:100%;
      background:var(--bg);
      color:var(--cream);
      font-family:var(--font-sans);
      -webkit-font-smoothing:antialiased;
    }

    body{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      padding:24px;
      text-align:center;
    }

    /* Atmospheric background */
    body::before{
      content:'';
      position:fixed;inset:0;z-index:0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,162,39,.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 50% 100%, rgba(201,162,39,.04) 0%, transparent 60%);
      pointer-events:none;
    }

    .card{
      position:relative;z-index:1;
      background:var(--bg-card);
      border:1px solid var(--border);
      border-radius:24px;
      padding:48px 40px;
      max-width:480px;
      width:100%;
      backdrop-filter:blur(12px);
    }

    .icon{
      width:80px;height:80px;
      background:rgba(201,162,39,.1);
      border:1px solid var(--border);
      border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 28px;
      animation:pulse 2s ease-in-out infinite;
    }
    .icon svg{opacity:.7}

    @keyframes pulse{
      0%,100%{box-shadow:0 0 0 0 rgba(201,162,39,.25)}
      50%{box-shadow:0 0 0 12px rgba(201,162,39,0)}
    }

    .logo{
      height:48px;width:auto;
      display:block;margin:0 auto 32px;
      opacity:.85;
    }

    .eyebrow{
      font-family:var(--font-display);
      font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;
      color:var(--gold);margin-bottom:14px;
    }

    h1{
      font-family:var(--font-serif);
      font-size:1.6rem;font-weight:700;
      color:var(--cream);line-height:1.25;
      margin-bottom:14px;
    }

    p{
      font-size:.9rem;color:var(--cream-muted);
      line-height:1.7;margin-bottom:8px;
    }

    .divider{
      display:flex;align-items:center;gap:12px;
      margin:24px 0;opacity:.3;
    }
    .divider span{flex:1;height:1px;background:var(--gold)}

    .btn{
      display:inline-flex;align-items:center;gap:8px;
      padding:13px 28px;border-radius:9999px;
      font-family:var(--font-display);font-size:.75rem;
      font-weight:700;letter-spacing:.12em;text-transform:uppercase;
      cursor:pointer;border:none;
      transition:all .2s;text-decoration:none;
    }
    .btn--primary{
      background:linear-gradient(135deg,#c9a227,#a07a18);
      color:#000;
    }
    .btn--primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,162,39,.3)}
    .btn--ghost{
      background:transparent;
      color:var(--cream-muted);
      border:1px solid var(--border);
    }
    .btn--ghost:hover{border-color:var(--gold);color:var(--gold)}

    .actions{
      display:flex;flex-direction:column;gap:12px;
      margin-top:28px;
    }

    .status{
      display:flex;align-items:center;justify-content:center;gap:8px;
      font-size:.78rem;color:var(--cream-muted);
      margin-top:20px;padding-top:20px;
      border-top:1px solid var(--border);
    }
    .status-dot{
      width:8px;height:8px;border-radius:50%;
      background:#e74c3c;
      animation:blink 1.4s ease-in-out infinite;
    }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  </style>
</head>
<body>
  <div class="card">
    <img src="assets/images/logos/logo.png" alt="Lord's Burger House" class="logo" onerror="this.style.display='none'"/>

    <div class="icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#c9a227" stroke-width="1.5">
        <path d="M1 6l11 7 11-7"/>
        <path d="M1 18h22"/>
        <path d="M1 6v12h22V6"/>
        <line x1="12" y1="2" x2="12" y2="6"/>
        <line x1="9" y1="4" x2="15" y2="4"/>
      </svg>
    </div>

    <div class="eyebrow">Conexão perdida</div>
    <h1>Você está offline</h1>

    <p>Parece que você está sem internet no momento. Verifique sua conexão e tente novamente.</p>
    <p>O cardápio e o histórico de pedidos estarão disponíveis assim que a conexão for restaurada.</p>

    <div class="divider"><span></span><svg width="12" height="12" viewBox="0 0 24 24" fill="#c9a227"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg><span></span></div>

    <div class="actions">
      <button class="btn btn--primary" onclick="tryReload()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 101.85-4.8L1 10"/></svg>
        Tentar novamente
      </button>
      <a href="./" class="btn btn--ghost">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Ir para o início
      </a>
    </div>

    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Sem conexão</span>
    </div>
  </div>

  <script>
    function tryReload() {
      window.location.reload();
    }

    function updateStatus() {
      const dot  = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      if (navigator.onLine) {
        dot.style.background  = '#27ae60';
        dot.style.animation   = 'none';
        text.textContent      = 'Conexão restaurada — recarregando...';
        setTimeout(() => window.location.href = './', 800);
      } else {
        dot.style.background = '#e74c3c';
        text.textContent     = 'Sem conexão';
      }
    }

    window.addEventListener('online',  updateStatus);
    window.addEventListener('offline', updateStatus);
    updateStatus();
  </script>
</body>
</html>
